name: Build and deploy offline piano

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Restore mastered piano cache
        id: audio-cache
        uses: actions/cache@v4
        with:
          path: .piano-cache/audio
          key: salamander-v3-48k-mp3-320-v1

      - name: Download and master the lossless piano library
        if: steps.audio-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .piano-cache/audio .piano-source
          archive="$RUNNER_TEMP/SalamanderGrandPiano.tar.gz"
          curl --fail --location --retry 5 --retry-delay 5 \
            --output "$archive" \
            "https://freepats.zenvoid.org/Piano/SalamanderGrandPiano/SalamanderGrandPiano-SFZ+FLAC-V3+20200602.tar.gz"
          tar -xzf "$archive" -C .piano-source
          source_count="$(find .piano-source -type f -iname '*.flac' | wc -l | tr -d ' ')"
          test "$source_count" = "641"
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          find .piano-source -type f -iname '*.flac' -print0 | \
            xargs -0 -n 1 -P 3 bash -c '
              input="$1"
              name="$(basename "${input%.*}")"
              ffmpeg -hide_banner -loglevel error -nostdin -y \
                -i "$input" -map 0:a:0 -codec:a libmp3lame -b:a 320k \
                -ar 48000 -map_metadata -1 ".piano-cache/audio/${name}.mp3"
            ' _

      - name: Verify complete piano library
        shell: bash
        run: |
          set -euo pipefail
          generated_count="$(find .piano-cache/audio -type f -name '*.mp3' | wc -l | tr -d ' ')"
          test "$generated_count" = "641"
          while IFS= read -r file; do
            test -s ".piano-cache/audio/$file"
          done < audio-files.txt

      - name: Assemble site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/audio
          cp index.html recognition-assets.json manifest.webmanifest sw.js icon.svg LICENSE-SAMPLES.md _site/
          cp .piano-cache/audio/*.mp3 _site/audio/
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
